services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: inventario_db
      POSTGRES_USER: inventario
      POSTGRES_PASSWORD: secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inventario -d inventario_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    volumes:
      - ./backend:/var/www/html
      - backend_vendor:/var/www/html/vendor
    environment:
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: inventario_db
      DB_USERNAME: inventario
      DB_PASSWORD: secret
      APP_URL: http://localhost:8000
      SANCTUM_STATEFUL_DOMAINS: localhost:5173
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      VITE_PROXY_TARGET: http://backend:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:
  backend_vendor:
  frontend_node_modules:
